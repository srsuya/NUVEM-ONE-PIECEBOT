version: "3.9"

services:
  bot:
    build: .
    container_name: nuvem-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_TYPE: sqlite
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./temp:/app/temp
    ports:
      - "3000:3000"
    networks:
      - nuvem-network

  postgres:
    image: postgres:16-alpine
    container_name: nuvem-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuvem_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nuvem-network

volumes:
  postgres-data:

networks:
  nuvem-network:
    driver: bridge
